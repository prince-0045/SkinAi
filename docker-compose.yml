version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Read ALL environment variables from the .env file
    env_file:
      - .env
    environment:
      # You can still hardcode specific overrides here if needed
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # Read ALL environment variables from the .env file
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      args:
        # These are used at BUILD TIME for the React build
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

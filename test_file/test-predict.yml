config:
  target: "http://localhost:8000"
  phases:
    - duration: 20       # Run for 20 seconds
      arrivalRate: 2     # Keep arrival rate low! ML models use heavy CPU
scenarios:
  - name: "Skin Disease Prediction Flow"
    flow:
      - post:
          url: "/api/v1/scan/predict"
          headers:
            # You MUST paste a raw, valid JWT token from a logged-in user here
            Authorization: "Bearer YOUR_ACTUAL_JWT_TOKEN_HERE"
          formData:
            file:
              fromFile: "./sample_skin.jpg" # Make sure this file exists locally!
